<!DOCTYPE html>
<html>
<head>
    <title>Telco Churn Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<form action="/predict" method="POST" class="card">

<!-- LEFT SIDE -->
<div class="left">
    <h2>📡 SIM</h2>

    <label><input type="radio" name="sim" value="Jio" required> Jio</label>
    <label><input type="radio" name="sim" value="Airtel"> Airtel</label>
    <label><input type="radio" name="sim" value="VI"> VI</label>
    <label><input type="radio" name="sim" value="BSNL"> BSNL</label>
</div>

<!-- RIGHT SIDE -->
<div class="right">

<h2>Customer Details</h2>

<label>Tenure</label>
<input type="number" name="tenure" required>

<label>Monthly Charges</label>
<input type="number" name="monthly" required>

<label>Gender</label>
<select name="gender">
    <option>Male</option>
    <option>Female</option>
</select>

<label>Senior Citizen</label>
<select name="senior">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Partner</label>
<select name="partner">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Dependents</label>
<select name="dependents">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Phone Service</label>
<select name="phone">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Multiple Lines</label>
<select name="multiple">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Internet</label>
<select name="internet">
    <option>Fiber optic</option>
    <option>No</option>
</select>

<label>Online Security</label>
<select name="security">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Backup</label>
<select name="backup">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Device Protection</label>
<select name="device">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Tech Support</label>
<select name="support">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Streaming TV</label>
<select name="tv">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Streaming Movies</label>
<select name="movies">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Contract</label>
<select name="contract">
    <option>Month-to-month</option>
    <option>One year</option>
    <option>Two year</option>
</select>

<label>Paperless Billing</label>
<select name="paper">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Payment Method</label>
<select name="payment">
    <option>Electronic check</option>
    <option>Mailed check</option>
    <option>Credit card (automatic)</option>
</select>

<button type="submit">Predict</button>

{% if prediction %}
<div class="result">{{prediction}}</div>
{% endif %}

</div>

</form>
</div>

</body>
</html>
